<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Users Icon</title>
  <desc>Users icon representing happy clients</desc>
  
  <!-- Define glow filter -->
  <defs>
    <filter id="gold-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feColorMatrix type="matrix" values="0.96 0 0 0 0.62
                                           0 0.62 0 0 0.04
                                           0 0 0.04 0 0.69
                                           0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal"/>
    </filter>
  </defs>
  
  <!-- Users icon with gold accent -->
  <g filter="url(#gold-glow)">
    <!-- First user -->
    <circle cx="18" cy="16" r="5" stroke="#F59E0B" stroke-width="2" fill="none"/>
    <path d="M10 34C10 29.5817 13.5817 26 18 26C22.4183 26 26 29.5817 26 34" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Second user -->
    <circle cx="32" cy="18" r="4" stroke="#F59E0B" stroke-width="2" fill="none"/>
    <path d="M38 34C38 30.6863 35.3137 28 32 28C30.5 28 29.2 28.5 28 29.5" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
