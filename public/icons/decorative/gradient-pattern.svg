<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Gradient Pattern</title>
  <desc>Dots and lines pattern for subtle background texture</desc>
  
  <!-- Pattern definition -->
  <defs>
    <pattern id="dots-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2A2A2A" opacity="0.5"/>
      <circle cx="12" cy="12" r="1" fill="#2A2A2A" opacity="0.5"/>
    </pattern>
    
    <pattern id="lines-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="10" x2="20" y2="10" stroke="#2A2A2A" stroke-width="0.5" opacity="0.3"/>
      <line x1="10" y1="0" x2="10" y2="20" stroke="#2A2A2A" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Apply patterns -->
  <rect width="100" height="100" fill="url(#dots-pattern)"/>
  <rect width="100" height="100" fill="url(#lines-pattern)" opacity="0.5"/>
</svg>
