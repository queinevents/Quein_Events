<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Floating Shapes</title>
  <desc>Circles and geometric shapes with vibrant glow effects</desc>
  
  <defs>
    <!-- Purple glow -->
    <filter id="purple-shape-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feColorMatrix type="matrix" values="0.54 0 0 0 0.36
                                           0 0.36 0 0 0.96
                                           0 0 0.96 0 0.96
                                           0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal"/>
    </filter>
    
    <!-- Blue glow -->
    <filter id="blue-shape-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feColorMatrix type="matrix" values="0.23 0 0 0 0.51
                                           0 0.51 0 0 0.96
                                           0 0 0.96 0 0.96
                                           0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal"/>
    </filter>
    
    <!-- Gold glow -->
    <filter id="gold-shape-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feColorMatrix type="matrix" values="0.96 0 0 0 0.62
                                           0 0.62 0 0 0.04
                                           0 0 0.04 0 0.69
                                           0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal"/>
    </filter>
  </defs>
  
  <!-- Purple circle -->
  <circle cx="80" cy="80" r="30" stroke="#8B5CF6" stroke-width="2" fill="none" filter="url(#purple-shape-glow)" opacity="0.7"/>
  
  <!-- Blue hexagon -->
  <polygon points="150,50 180,70 180,110 150,130 120,110 120,70" stroke="#3B82F6" stroke-width="2" fill="none" filter="url(#blue-shape-glow)" opacity="0.7"/>
  
  <!-- Gold triangle -->
  <polygon points="220,180 250,230 190,230" stroke="#F59E0B" stroke-width="2" fill="none" filter="url(#gold-shape-glow)" opacity="0.7"/>
  
  <!-- Small purple square -->
  <rect x="50" y="200" width="40" height="40" stroke="#8B5CF6" stroke-width="2" fill="none" filter="url(#purple-shape-glow)" opacity="0.6"/>
</svg>
