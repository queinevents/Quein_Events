<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Check Circle Icon</title>
  <desc>Check circle icon representing completed events</desc>
  
  <!-- Define glow filter -->
  <defs>
    <filter id="blue-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feColorMatrix type="matrix" values="0.23 0 0 0 0.51
                                           0 0.51 0 0 0.96
                                           0 0 0.96 0 0.96
                                           0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal"/>
    </filter>
  </defs>
  
  <!-- Check circle with blue accent -->
  <g filter="url(#blue-glow)">
    <!-- Circle -->
    <circle cx="24" cy="24" r="16" stroke="#3B82F6" stroke-width="2" fill="none"/>
    
    <!-- Check mark -->
    <path d="M16 24L21 29L32 18" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
